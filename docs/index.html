<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shadow Blaster</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(35, 216, 255, 0.22), transparent 30%),
        radial-gradient(circle at 76% 24%, rgba(143, 92, 255, 0.22), transparent 28%),
        radial-gradient(circle at 44% 82%, rgba(72, 255, 155, 0.08), transparent 26%),
        #050713;
      color: #f5f7ff;
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      padding: 32px 22px;
    }
    .card {
      max-width: 520px;
      text-align: center;
      padding: 32px;
      border: 2px solid rgba(35, 216, 255, 0.34);
      background: linear-gradient(180deg, rgba(16, 22, 48, 0.86), rgba(5, 7, 19, 0.82));
      box-shadow: 6px 6px 0 #000, 0 0 30px rgba(35, 216, 255, 0.12);
    }
    h1 {
      margin: 0 0 12px;
      color: #ffe066;
      font-size: clamp(40px, 9vw, 72px);
      line-height: 0.95;
      text-shadow: 4px 4px 0 #000, -3px 0 0 #ff365f, 3px 0 0 #23d8ff;
      text-transform: uppercase;
      font-family: "Audiowide", "Impact", fantasy;
    }
    p { margin: 8px 0 22px; color: #d7def4; }
    a {
      display: inline-block;
      margin: 6px;
      padding: 10px 20px;
      border: 2px solid #f5f7ff;
      background: linear-gradient(180deg, #b58cff 0%, #8f5cff 56%, #3e1f86 100%);
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 #000;
      font-weight: 700;
    }
    a:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 #000; }
    a.primary {
      background: linear-gradient(180deg, #ff5f7e 0%, #ff365f 56%, #b9153c 100%);
    }
    .muted { color: #9aa4bd; font-size: 14px; margin-top: 22px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Shadow Blaster</h1>
    <p>Arcade space shooter, built for fast hands and faster reflexes.</p>
    <p>
      <a class="primary" href="https://github.com/xADROCx1/shadow-blaster">Source on GitHub</a>
      <a href="privacy-policy.html">Privacy Policy</a>
    </p>
    <p class="muted">$0.99/month after a 7-day free trial. Available on the App Store.</p>
  </main>
</body>
</html>
